name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build Release
      run: cargo build --release
    
    - name: Get Version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/release/voria
        draft: false
        prerelease: false
        body: |
          # voria ${{ steps.version.outputs.VERSION }}
          
          ## Installation
          ```bash
          npm install -g @voria/cli
          ```
          
          ## Changelog
          See [CHANGELOG.md](./docs/CHANGELOG.md) for details.
          
          ## Getting Started
          ```bash
          voria --init
          voria plan <issue_id>
          ```
          
          ## Links
          - Docs: https://github.com/Srizdebnath/voria/tree/master/docs
          - Contributing: https://github.com/Srizdebnath/voria/blob/master/CONTRIBUTING.md
          - Issues: https://github.com/Srizdebnath/voria/issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Notify
      run: |
        echo "::notice title=Release::voria ${{ steps.version.outputs.VERSION }} released!"
